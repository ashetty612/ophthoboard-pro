name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npx next lint --quiet
      - name: Hooks ordering
        run: node scripts/check-hooks-ordering.mjs
      - name: Content validation
        run: node scripts/validate-content.mjs
      - name: Build
        run: npm run build
      - name: Unit tests (if Vitest installed)
        run: npm test || echo "Vitest not yet configured"
        continue-on-error: true
